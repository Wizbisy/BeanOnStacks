<svg
  viewBox="0 0 300 300"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background circle -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color: #1a0a2e; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #0d0018; stop-opacity: 1" />
    </radialGradient>
    <linearGradient id="beanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #8b4513" />
      <stop offset="50%" style="stop-color: #a0522d" />
      <stop offset="100%" style="stop-color: #6b3410" />
    </linearGradient>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ffd700" />
      <stop offset="100%" style="stop-color: #b8860b" />
    </linearGradient>
  </defs>
  <circle
    cx="150"
    cy="150"
    r="145"
    fill="url(#bgGrad)"
    stroke="#5B21B6"
    stroke-width="2"
  />

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="250" cy="60" r="1" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="80" cy="250" r="1.2" fill="#fff" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="230" cy="230" r="1" fill="#fff" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="40" cy="150" r="1.3" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="270" cy="140" r="0.8" fill="#fff" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite" />
  </circle>

  <!-- Coin stack -->
  <ellipse cx="150" cy="220" rx="40" ry="10" fill="url(#stackGrad)" stroke="#996515" stroke-width="1" />
  <rect x="110" y="210" width="80" height="10" fill="url(#stackGrad)" />
  <ellipse cx="150" cy="210" rx="40" ry="10" fill="#FFD700" stroke="#996515" stroke-width="1" />
  <rect x="110" y="200" width="80" height="10" fill="url(#stackGrad)" />
  <ellipse cx="150" cy="200" rx="40" ry="10" fill="#FFD700" stroke="#996515" stroke-width="1" />
  <text x="150" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="#996515">₿</text>

  <!-- Bean body -->
  <ellipse cx="150" cy="145" rx="42" ry="55" fill="url(#beanGrad)" stroke="#5a2d0c" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite" />
  </ellipse>
  <!-- Bean crease -->
  <path d="M 150 95 Q 140 145 150 195" fill="none" stroke="#5a2d0c" stroke-width="2.5" stroke-linecap="round">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite" />
  </path>
  <!-- Eyes -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite" />
    <circle cx="136" cy="135" r="5" fill="#fff" />
    <circle cx="164" cy="135" r="5" fill="#fff" />
    <circle cx="137" cy="136" r="2.5" fill="#1a0a2e" />
    <circle cx="165" cy="136" r="2.5" fill="#1a0a2e" />
    <circle cx="138" cy="134" r="1" fill="#fff" />
    <circle cx="166" cy="134" r="1" fill="#fff" />
  </g>
  <!-- Smile -->
  <path d="M 140 150 Q 150 160 160 150" fill="none" stroke="#5a2d0c" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Collection name -->
  <text x="150" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#A78BFA" letter-spacing="2">BEANONSTACKS</text>
</svg>
